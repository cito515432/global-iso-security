<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global ISO Security - Iniciar Sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-wrapper d-flex justify-content-center align-items-center vh-100">
        <div class="login-card p-5">
            <div class="text-center mb-4">
                <h1 class="login-title">GLOBAL<br><span>ISO SECURITY</span></h1>
                <h2 class="mt-3">INICIAR SESION</h2>
                <p class="login-subtitle">Acceso seguro al sistema</p>
            </div>
            <div class="mb-3">
                <label class="form-label login-label">CORREO ELECTRONICO</label>
                <input type="email" id="email" class="form-control login-input" placeholder="correo@empresa.com">
            </div>
            <div class="mb-4">
                <label class="form-label login-label">CONTRASENA</label>
                <input type="password" id="password" class="form-control login-input" placeholder="••••••••">
            </div>
            <div id="error-msg" style="color:#ef4444; font-size:0.85rem; margin-bottom:10px; display:none;"></div>
            <div class="d-grid">
                <button class="btn btn-login" onclick="login()">INICIAR SESION</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
