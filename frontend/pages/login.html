<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global ISO Security - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-wrapper d-flex justify-content-center align-items-center vh-100">
        <div class="login-card p-5">

            <!-- Logo y título -->
            <div class="text-center mb-4">
                <h1 class="login-title">GLOBAL<br><span>ISO SECURITY</span></h1>
                <h2 class="mt-3">INICIAR SESIÓN</h2>
                <p class="login-subtitle">Acceso seguro al sistema</p>
            </div>

            <!-- Formulario -->
            <div class="mb-3">
                <label class="form-label login-label">USUARIO</label>
                <input type="text" class="form-control login-input" placeholder="---------">
            </div>

            <div class="mb-4">
                <label class="form-label login-label">CONTRASEÑA</label>
                <input type="password" class="form-control login-input" placeholder="********">
            </div>

            <div class="d-grid">
                <button class="btn btn-login">INICIAR</button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
